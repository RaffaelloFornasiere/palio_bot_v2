version: '3.8'

services:
  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.telegram
    container_name: palio-telegram-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PALIO_FILE_PATH=/app/data/palio.json
      - SESSION_FILE_PATH=/app/data/session.json
      - LLAMACPP_URL=${LLAMACPP_URL:-http://mac-studio.local:11454}
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    depends_on:
      - api-server
    networks:
      - palio-network

  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: palio-api-server
    restart: unless-stopped
    ports:
      - "22025:8000"
    environment:
      - PALIO_FILE_PATH=/app/data/palio.json
    volumes:
      - ../data:/app/data
    networks:
      - palio-network

networks:
  palio-network:
    driver: bridge